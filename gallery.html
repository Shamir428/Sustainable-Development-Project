<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Health & Wellbeing</title>
    <link rel="stylesheet" href="style.css">

    <style>
    /* ===== GALLERY PAGE ONLY STYLES ===== */


    
    </style>
</head>

<body>

<header>
    <div class="container header-container">
        <div class="logo">
            <img src="img/" alt="Health and wellbeing logo">
            <h1>Health & Wellbeing</h1>
        </div>

        <nav>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="ais.html">Action Impact Simulator</a></li>
                <li><a href="gallery.html" class="active">Gallery</a></li>
                <li><a href="feedback.html">Feedback</a></li>
                <li><a href="team.html">Team</a></li>
                
            </ul>
        </nav>
    </div>
</header>

<main class="container">

    <h1>Gallery</h1>
    <p>Explore different aspects of health and wellbeing through images and insights.</p>

    <!-- GALLERY GRID -->
    <div class="gallery-grid">

        <div class="gallery-item" onclick="openModal('img/imagesexercise.jpg', 'Staying active improves both physical and mental health.')">
            <img src="img/imagesexercise.jpg" alt="Students exercising">
            <p>Stay Active</p>
        </div>

        <div class="gallery-item" onclick="openModal('img/imagessleep.jpg', 'Getting enough sleep helps recovery and focus.')">
            <img src="img/imagessleep.jpg" alt="Student sleeping">
            <p>Healthy Sleep</p>
        </div>

        <div class="gallery-item" onclick="openModal('img/food1.jpg', 'Balanced nutrition supports energy and wellbeing.')">
            <img src="img/food1.jpg" alt="Healthy food">
            <p>Nutrition</p>
        </div>

        <div class="gallery-item" onclick="openModal('img/imageswalking.jpg', 'Walking daily is a simple way to stay active.')">
            <img src="img/imageswalking.jpg" alt="Person walking">
            <p>Daily Activity</p>
        </div>

    </div>

</main>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content" id="modalContent">

        <button type="button" class="close-btn" onclick="closeModal()">Close</button>

        <!-- ✅ FIXED (no empty src + has alt) -->
        <img id="modalImg" src="img/food1.jpg" alt="Expanded gallery image">

        <p id="modalText"></p>

        <div class="controls">
            <button type="button" onclick="changeColor()">Change Colour</button>
            <button type="button" onclick="changeFont()">Change Font</button>
        </div>

    </div>
</div>

<footer>
    <p>
        <a href="pageEditor_ST1.html">Page Editor</a> |
        <a href="validation_ST1.html">Validation</a> |
        
    </p>
    <p>Shamir Zeeshan | w2132884</p>
</footer>

<!-- JAVASCRIPT -->
<script>
function openModal(imgSrc, text) {
    const modal = document.getElementById("modal");
    const img = document.getElementById("modalImg");

    modal.style.display = "flex";
    img.src = imgSrc;
    document.getElementById("modalText").innerText = text;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function changeColor() {
    document.getElementById("modalContent").style.background = "#e0f7fa";
}

function changeFont() {
    document.getElementById("modalContent").style.fontFamily = "cursive";
}
</script>

<script>
const items = document.querySelectorAll(".gallery-item");

items.forEach(item => {
    item.addEventListener("mouseover", () => {
        item.style.transform = "scale(1.05)";
    });

    item.addEventListener("mouseout", () => {
        item.style.transform = "scale(1)";
    });
});
</script>

</body>
</html>
